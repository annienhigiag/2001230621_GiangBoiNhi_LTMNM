<!DOCTYPE html>
<html lang="vi">
<head>
    <!-- Khai báo bảng mã UTF-8 -->
    <meta charset="UTF-8">

    <!-- Giúp trang hiển thị tốt trên điện thoại -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tiêu đề trang -->
    <title>Hello JavaScript</title>
</head>
<body>
    <!-- Thẻ h2 có id msg để JavaScript thay đổi nội dung -->
    <h2 id="msg"></h2>

    <!-- Nút quay lại menu Bài 1 -->
    <a href="index.html">Quay lại menu</a>

    <!-- Bắt đầu đoạn mã JavaScript -->
    <script>
        // Tìm phần tử có id là msg và gán nội dung Hello JavaScript
        document.getElementById("msg").innerText = "Hello JavaScript";
    </script>
</body>
</html>
