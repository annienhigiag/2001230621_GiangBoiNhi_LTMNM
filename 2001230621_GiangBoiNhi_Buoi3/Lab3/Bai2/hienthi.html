<!DOCTYPE html>
<html lang="vi">
<head>
    <!-- Khai báo bảng mã UTF-8 -->
    <meta charset="UTF-8">

    <!-- Giúp trang hiển thị tốt trên điện thoại -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tiêu đề trang -->
    <title>Hiển thị nội dung input</title>
</head>
<body>
    <!-- Ô nhập nội dung -->
    <input type="text" id="txt" placeholder="Nhập gì đó">

    <!-- Nút gọi hàm showText khi được bấm -->
    <button onclick="showText()">Hiển thị</button>

    <!-- Thẻ div dùng để hiển thị nội dung -->
    <div id="output"></div>

    <!-- Nút quay lại menu Bài 2 -->
    <a href="index.html">Quay lại menu</a>

    <!-- Bắt đầu đoạn mã JavaScript -->
    <script>
        // Khai báo hàm hiển thị nội dung
        function showText() {
            // Lấy giá trị từ ô txt và hiển thị vào thẻ output
            document.getElementById("output").innerText = document.getElementById("txt").value;
        }
    </script>
</body>
</html>
