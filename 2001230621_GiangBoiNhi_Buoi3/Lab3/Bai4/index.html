<!DOCTYPE html>
<html lang="vi">
<head>
    <!-- Khai báo bảng mã UTF-8 -->
    <meta charset="UTF-8">

    <!-- Giúp trang hiển thị tốt trên điện thoại -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tiêu đề trang -->
    <title>Bài 4 - Thời gian server</title>
</head>
<body>
    <!-- Thẻ h1 dùng để hiển thị thời gian -->
    <h1 id="time"></h1>

    <!-- Nút quay lại menu chính -->
    <a href="../index.html">Quay lại menu</a>

    <!-- Bắt đầu đoạn mã JavaScript -->
    <script>
        // Khai báo hàm lấy thời gian từ file time.php
        function getTime() {
            // Gửi yêu cầu đến file time.php
            fetch('time.php')

            // Chuyển phản hồi nhận được thành văn bản
            .then(res => res.text())

            // Hiển thị dữ liệu vào thẻ có id time
            .then(data => document.getElementById("time").innerText = data);
        }

        // Gọi hàm getTime sau mỗi 5 giây
        setInterval(getTime, 5000);

        // Gọi hàm ngay khi trang vừa tải
        getTime();
    </script>
</body>
</html>
